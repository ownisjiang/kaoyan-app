# ================================
# 研题库 Docker Compose 一键部署
# 启动：docker compose up -d
# ================================

services:
  # ---- Nacos 注册中心 ----
  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: yantiku-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      PREFER_HOST_MODE: hostname
      TZ: Asia/Shanghai
    ports:
      - "8848:8848"
      - "9848:9848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - yantiku-net

  # ---- MySQL 8.0 ----
  mysql:
    image: mysql:8.0
    container_name: yantiku-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS:-yantiku_root_2026}
      MYSQL_DATABASE: yantiku
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/conf:/etc/mysql/conf.d:ro
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASS:-yantiku_root_2026}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - yantiku-net

  # ---- Redis 7 ----
  redis:
    image: redis:7-alpine
    container_name: yantiku-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis/conf/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - yantiku-net

  # ---- RabbitMQ 3.12 ----
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: yantiku-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-yantiku}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-yantiku_pass_2026}
      RABBITMQ_DEFAULT_VHOST: yantiku
      TZ: Asia/Shanghai
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - yantiku-net

  # ---- 网关 ----
  gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: yantiku-gateway
        PORT: "8080"
    container_name: yantiku-gateway
    restart: unless-stopped
    depends_on:
      nacos:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      NACOS_ADDR: nacos:8848
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
    networks:
      - yantiku-net

  # ---- 认证服务 ----
  auth:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: yantiku-auth
        PORT: "8081"
    container_name: yantiku-auth
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-yantiku}
      MYSQL_PASS: ${MYSQL_PASS:-yantiku_pass_2026}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production}
    volumes:
      - ./logs:/app/logs
    networks:
      - yantiku-net

  # ---- 题库服务 ----
  question:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: yantiku-question
        PORT: "8082"
    container_name: yantiku-question
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
    ports:
      - "8082:8082"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-yantiku}
      MYSQL_PASS: ${MYSQL_PASS:-yantiku_pass_2026}
    volumes:
      - ./logs:/app/logs
    networks:
      - yantiku-net

  # ---- 刷题服务 ----
  practice:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
      args:
        MODULE: yantiku-practice
        PORT: "8083"
    container_name: yantiku-practice
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      nacos:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      NACOS_ADDR: nacos:8848
      MYSQL_HOST: mysql
      MYSQL_USER: ${MYSQL_USER:-yantiku}
      MYSQL_PASS: ${MYSQL_PASS:-yantiku_pass_2026}
      REDIS_HOST: ${REDIS_HOST:-redis}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_USER: ${RABBITMQ_USER:-yantiku}
      RABBITMQ_PASS: ${RABBITMQ_PASS:-yantiku_pass_2026}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-yantiku}
      LLM_API_KEY: ${LLM_API_KEY:-}
    volumes:
      - ./logs:/app/logs
    networks:
      - yantiku-net

  # ---- 前端 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: yantiku-frontend
    restart: unless-stopped
    depends_on:
      - gateway
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - yantiku-net

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
  rabbitmq-data:
    driver: local

networks:
  yantiku-net:
    driver: bridge
