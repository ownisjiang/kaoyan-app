server:
  port: 8081

spring:
  application:
    name: yantiku-auth
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yml
  config:
    import: optional:nacos:yantiku-auth.yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/yantiku?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:yantiku_root_2026}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    clean-disabled: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.yantiku.module
  configuration:
    map-underscore-to-camel-case: true

jwt:
  access-secret: ${JWT_ACCESS_SECRET:yantiku-dev-access-key-2026-local}
  access-expiration: 900000
  refresh-secret: ${JWT_REFRESH_SECRET:yantiku-dev-refresh-key-2026-local}
  refresh-expiration: 604800000

logging:
  level:
    com.yantiku: INFO
