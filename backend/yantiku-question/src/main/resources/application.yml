server:
  port: 8082

spring:
  application:
    name: yantiku-question
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
  config:
    import: optional:nacos:yantiku-question.yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/yantiku?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:yantiku_root_2026}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.yantiku.module
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.yantiku: INFO
