server:
  port: 8083

spring:
  application:
    name: yantiku-practice
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
  config:
    import: optional:nacos:yantiku-practice.yml
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/yantiku?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:yantiku_root_2026}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:yantiku}
    password: ${RABBITMQ_PASS}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.yantiku.module
  configuration:
    map-underscore-to-camel-case: true

llm:
  api-key: ${LLM_API_KEY:}
  api-url: ${LLM_API_URL:https://api.deepseek.com/v1}
  model: ${LLM_MODEL:deepseek-chat}

logging:
  level:
    com.yantiku: INFO

# JWT (仅满足依赖注入, 实际由 Gateway 验证)
jwt:
  access-secret: ${JWT_ACCESS_SECRET:yantiku-dev-access-key-2026-local}
  access-expiration: 900000
  refresh-secret: ${JWT_REFRESH_SECRET:yantiku-dev-refresh-key-2026-local}
  refresh-expiration: 604800000
